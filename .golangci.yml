version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - modernize
    - unparam
  exclusions:
    paths:
      - "_.*"
      - ".worktrees"

formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    paths:
      - "_.*"
      - ".worktrees"

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
